<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Monti Keopi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFCFB; color: #2D2D2D; }
        .serif { font-family: 'Playfair Display', serif; }
        .bg-sand { background-color: #F4F1EE; }
        .text-oak { color: #634832; }
        .btn-oak { background-color: #634832; color: #FDFCFB; transition: all 0.3s ease; }
        .btn-oak:hover { background-color: #4A3525; transform: translateY(-1px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
        
        <div class="space-y-6 opacity-60">
            <div>
                <h1 class="serif text-4xl text-oak mb-2">Monti Chingu</h1>
                <p class="text-sm tracking-wide opacity-70 italic">Our 6th Anniversary Surprise</p>
            </div>
            
            <div class="space-y-4">
                <div class="p-4 border border-oak/10 rounded-xl bg-white/50">
                    <p class="text-xs uppercase tracking-widest mb-2 opacity-50">Customer Loyalty Portal</p>
                    <div class="h-10 w-full bg-sand rounded-lg mb-3"></div>
                    <div class="h-10 w-full bg-sand rounded-lg"></div>
                </div>
                <div class="inline-block px-4 py-2 border border-oak/20 rounded-full text-[11px] uppercase tracking-tighter">
                    ✨ Coming Soon for Chingus
                </div>
            </div>
        </div>

        <div class="bg-white p-8 md:p-12 rounded-[2rem] shadow-sm border border-oak/5">
            <div class="mb-8">
                <h2 class="serif text-3xl text-oak mb-1">Monti Partner</h2>
                <p class="text-xs opacity-50 uppercase tracking-widest">Internal Access Only</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest mb-2 opacity-60">Partner Email</label>
                    <input type="email" id="email" required class="w-full bg-sand px-4 py-3 rounded-xl outline-none focus:ring-1 focus:ring-oak/20 transition-all">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest mb-2 opacity-60">Password</label>
                    <input type="password" id="password" required class="w-full bg-sand px-4 py-3 rounded-xl outline-none focus:ring-1 focus:ring-oak/20 transition-all">
                </div>
                <button type="submit" id="submitBtn" class="w-full btn-oak py-4 rounded-xl font-medium text-sm mt-4">
                    Enter Command Center
                </button>
                <p id="errorMessage" class="text-red-400 text-xs text-center min-h-[1rem]"></p>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.innerText = 'Verifying...';
            errorMessage.innerText = '';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('https://monti-keopi-backend.marketing-montikeopi.workers.dev/api/partner/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Store the Passport (Token)
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    
                    // Redirect to the calculator (or a future dashboard)
                    window.location.href = '/calculator';
                } else {
                    errorMessage.innerText = data.error || 'Invalid credentials';
                    submitBtn.innerText = 'Enter Command Center';
                }
            } catch (err) {
                errorMessage.innerText = 'Connection error. Check your engine.';
                submitBtn.innerText = 'Enter Command Center';
            }
        });
    </script>
</body>
</html>
